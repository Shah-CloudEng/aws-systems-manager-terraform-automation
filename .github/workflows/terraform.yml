name: AWS Systems Manager Terraform Automation

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action to run'
        required: true
        default: 'plan'
        type: choice
        options:
          - validate
          - plan
          - apply

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.8.0

jobs:
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./environments/prod

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        id: init
        run: terraform init -backend=false -no-color

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: terraform-validate
    if: inputs.action == 'plan' || inputs.action == 'apply'
    defaults:
      run:
        working-directory: ./environments/prod

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Create Terraform State Bucket
        run: |
          aws s3api create-bucket \
            --bucket linuxautomation-tfstate-339713094763 \
            --region us-east-1 2>&1 || echo "Bucket already exists, continuing."
          aws s3api put-bucket-versioning \
            --bucket linuxautomation-tfstate-339713094763 \
            --versioning-configuration Status=Enabled
          aws s3api put-bucket-encryption \
            --bucket linuxautomation-tfstate-339713094763 \
            --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

      - name: Terraform Init
        id: init
        run: terraform init -no-color

      - name: Terraform Plan
        id: plan
        shell: bash
        run: |
          set -o pipefail
          terraform plan -no-color -input=false 2>&1 | tee /tmp/plan_output.txt
        continue-on-error: true

      - name: Write Plan to Job Summary
        if: always()
        run: |
          echo "## Terraform Plan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** \`${{ steps.plan.outcome }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>Show Plan Output</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```hcl' >> $GITHUB_STEP_SUMMARY
          cat /tmp/plan_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

      - name: Terraform Plan Status
        if: steps.plan.outcome == 'failure'
        run: |
          echo "::error::Terraform plan failed. Expand the 'Terraform Plan' step above or check the Job Summary for the full error output."
          exit 1

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: inputs.action == 'apply'
    environment: production
    defaults:
      run:
        working-directory: ./environments/prod

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Create Terraform State Bucket
        run: |
          aws s3api create-bucket \
            --bucket linuxautomation-tfstate-339713094763 \
            --region us-east-1 2>&1 || echo "Bucket already exists, continuing."
          aws s3api put-bucket-versioning \
            --bucket linuxautomation-tfstate-339713094763 \
            --versioning-configuration Status=Enabled
          aws s3api put-bucket-encryption \
            --bucket linuxautomation-tfstate-339713094763 \
            --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

      - name: Terraform Init
        id: init
        run: terraform init -no-color

      - name: Terraform Apply
        id: apply
        run: terraform apply -auto-approve -input=false

      - name: Output Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** Capstone" >> $GITHUB_STEP_SUMMARY
          echo "**Region:** ${{ env.AWS_REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Successfully Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps:" >> $GITHUB_STEP_SUMMARY
          echo "1. Verify EC2 instances in Fleet Manager" >> $GITHUB_STEP_SUMMARY
          echo "2. Check SSM Run Command execution" >> $GITHUB_STEP_SUMMARY
          echo "3. Verify ALB health checks" >> $GITHUB_STEP_SUMMARY
          echo "4. Access application via ALB DNS" >> $GITHUB_STEP_SUMMARY
