name: AWS Systems Manager Terraform Automation

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action to run'
        required: true
        default: 'plan'
        type: choice
        options:
          - validate
          - plan
          - apply

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.8.0
  TF_VAR_existing_vpc_id: "vpc-0754ae0f2dc3994b4"
  TF_VAR_public_subnet_ids: '["subnet-005124b9f7d860f27","subnet-0dd04eb42760b7764"]'
  TF_VAR_private_subnet_ids: '["subnet-03601c8d266296efb","subnet-0c8d80e674242de73"]'

jobs:
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./environments/prod

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        id: init
        run: terraform init -backend=false -no-color

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: terraform-validate
    if: inputs.action == 'plan' || inputs.action == 'apply'
    defaults:
      run:
        working-directory: ./environments/prod

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Create Terraform State Bucket
        run: |
          aws s3api create-bucket \
            --bucket linuxautomation-tfstate-339713094763 \
            --region us-east-1 2>&1 || echo "Bucket already exists, continuing."
          aws s3api put-bucket-versioning \
            --bucket linuxautomation-tfstate-339713094763 \
            --versioning-configuration Status=Enabled
          aws s3api put-bucket-encryption \
            --bucket linuxautomation-tfstate-339713094763 \
            --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

      - name: Terraform Init
        id: init
        run: terraform init -no-color

      - name: Terraform Plan
        id: plan
        shell: bash
        run: |
          set -o pipefail
          terraform plan -no-color -input=false 2>&1 | tee /tmp/plan_output.txt
        continue-on-error: true

      - name: Write Plan to Job Summary
        if: always()
        run: |
          echo "## Terraform Plan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** \`${{ steps.plan.outcome }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>Show Plan Output</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```hcl' >> $GITHUB_STEP_SUMMARY
          cat /tmp/plan_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

      - name: Terraform Plan Status
        if: steps.plan.outcome == 'failure'
        run: |
          echo "::error::Terraform plan failed. Expand the 'Terraform Plan' step above or check the Job Summary for the full error output."
          exit 1

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: inputs.action == 'apply'
    environment: production
    defaults:
      run:
        working-directory: ./environments/prod

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Create Terraform State Bucket
        run: |
          aws s3api create-bucket \
            --bucket linuxautomation-tfstate-339713094763 \
            --region us-east-1 2>&1 || echo "Bucket already exists, continuing."
          aws s3api put-bucket-versioning \
            --bucket linuxautomation-tfstate-339713094763 \
            --versioning-configuration Status=Enabled
          aws s3api put-bucket-encryption \
            --bucket linuxautomation-tfstate-339713094763 \
            --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

      - name: Terraform Init
        id: init
        run: terraform init -no-color

      - name: Import Existing Resources
        run: |
          # IAM - EC2 SSM role (hardcoded name, survives env changes)
          terraform import module.iam_ssm.aws_iam_role.ssm_role \
            EC2-SSM-WebServer-Role 2>&1 || true
          terraform import module.iam_ssm.aws_iam_instance_profile.ssm_profile \
            EC2-SSM-WebServer-Profile 2>&1 || true
          terraform import module.iam_ssm.aws_iam_role_policy.s3_ssm_logs \
            EC2-SSM-WebServer-Role:SSM-S3-Logs-Policy 2>&1 || true

          # IAM - Maintenance Window role (project-name only, no env in name)
          terraform import module.patch_manager.aws_iam_role.ssm_maintenance_window \
            LinuxAutomation-SSM-MaintenanceWindow-Role 2>&1 || true
          terraform import module.patch_manager.aws_iam_role_policy.ssm_maintenance_custom \
            LinuxAutomation-SSM-MaintenanceWindow-Role:SSM-Maintenance-Custom-Policy 2>&1 || true
          terraform import module.patch_manager.aws_iam_role_policy_attachment.ssm_maintenance_policy \
            LinuxAutomation-SSM-MaintenanceWindow-Role/arn:aws:iam::aws:policy/service-role/AmazonSSMMaintenanceWindowRole 2>&1 || true

          # SSM Patch Baseline (AmazonLinux) + Patch Group
          AMZN_BASELINE_ID=$(aws ssm describe-patch-baselines \
            --filters "Key=OWNER,Values=Self" \
            --query "BaselineIdentities[?contains(BaselineName, 'AmazonLinux') && OperatingSystem=='AMAZON_LINUX_2023'].BaselineId | [0]" \
            --output text 2>/dev/null | tr -d '[:space:]')
          echo "AmazonLinux baseline ID: $AMZN_BASELINE_ID"
          if [ -n "$AMZN_BASELINE_ID" ] && [ "$AMZN_BASELINE_ID" != "None" ]; then
            terraform import module.patch_manager.aws_ssm_patch_baseline.amazon_linux \
              "$AMZN_BASELINE_ID" 2>&1 || true
            terraform import module.patch_manager.aws_ssm_patch_group.web_servers \
              "${AMZN_BASELINE_ID},LinuxAutomation-WebServers" 2>&1 || true
          fi

          # SSM Patch Baseline (Default)
          DEFAULT_BASELINE_ID=$(aws ssm describe-patch-baselines \
            --filters "Key=OWNER,Values=Self" \
            --query "BaselineIdentities[?contains(BaselineName, 'Default') && OperatingSystem=='AMAZON_LINUX_2023'].BaselineId | [0]" \
            --output text 2>/dev/null | tr -d '[:space:]')
          echo "Default baseline ID: $DEFAULT_BASELINE_ID"
          if [ -n "$DEFAULT_BASELINE_ID" ] && [ "$DEFAULT_BASELINE_ID" != "None" ]; then
            terraform import module.patch_manager.aws_ssm_patch_baseline.default_baseline \
              "$DEFAULT_BASELINE_ID" 2>&1 || true
          fi

          # SSM Document
          terraform import module.systems_manager.aws_ssm_document.install_apache \
            LinuxAutomation-Install-Apache 2>&1 || true

          # SSM Association (lookup by name)
          ASSOC_ID=$(aws ssm list-associations \
            --association-filter-list "key=AssociationName,value=LinuxAutomation-Apache-Deployment" \
            --query 'Associations[0].AssociationId' \
            --output text 2>/dev/null)
          if [ -n "$ASSOC_ID" ] && [ "$ASSOC_ID" != "None" ]; then
            terraform import module.systems_manager.aws_ssm_association.apply_apache_config \
              "$ASSOC_ID" 2>&1 || true
          fi

      - name: Terraform Apply
        id: apply
        run: terraform apply -auto-approve -input=false

      - name: Output Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** Capstone" >> $GITHUB_STEP_SUMMARY
          echo "**Region:** ${{ env.AWS_REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Successfully Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps:" >> $GITHUB_STEP_SUMMARY
          echo "1. Verify EC2 instances in Fleet Manager" >> $GITHUB_STEP_SUMMARY
          echo "2. Check SSM Run Command execution" >> $GITHUB_STEP_SUMMARY
          echo "3. Verify ALB health checks" >> $GITHUB_STEP_SUMMARY
          echo "4. Access application via ALB DNS" >> $GITHUB_STEP_SUMMARY
